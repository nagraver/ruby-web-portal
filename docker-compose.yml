
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_HOST: db
      DATABASE_USERNAME: ${POSTGRES_USERNAME}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      FORCE_SSL: "true"
      ASSUME_SSL: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.portal-http.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.portal-http.entrypoints=web
      - traefik.http.routers.portal-http.middlewares=portal-https-redirect
      - traefik.http.middlewares.portal-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.portal-https.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.portal-https.entrypoints=websecure
      - traefik.http.routers.portal-https.tls=true
      - traefik.http.routers.portal-https.tls.certresolver=le
      - traefik.http.services.portal.loadbalancer.server.port=3000

volumes:
  postgres_data:

networks:
  proxy:
    external: true
